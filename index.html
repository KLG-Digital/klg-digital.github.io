  <style>
    /* ── PLANÈTES EN CERCLE — spécifique à cette page ── */
    :root {
      --radius:        clamp(90px, 22vmin, 160px);
      --planet-size:   clamp(70px, 16vmin, 110px);
      --planet-offset: calc(var(--planet-size) / 2);
    }

    .orbit-container {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width:  calc(var(--radius) * 2 + var(--planet-size));
      height: calc(var(--radius) * 2 + var(--planet-size));
    }

    .planet {
      position: absolute;
      width:  var(--planet-size);
      height: var(--planet-size);
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #a855f7, #4c1d95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
      font-weight: bold;
      text-decoration: none;
      font-size: clamp(0.65em, 2.5vmin, 0.9em);
      line-height: 1.6;
      gap: 4px;
      animation: float 6s ease-in-out infinite;
      animation-delay: calc(var(--i) * 1.5s);
      transition: box-shadow 0.3s, filter 0.3s;
      left: calc(50% + var(--radius) * cos(calc(var(--i) * 90deg - 90deg)) - var(--planet-offset));
      top:  calc(50% + var(--radius) * sin(calc(var(--i) * 90deg - 90deg)) - var(--planet-offset));
    }

    .planet i { font-size: 1.3em; }

    .planet:hover {
      box-shadow: 0 0 25px #9333ea;
      filter: brightness(1.15);
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(clamp(-6px, -2vmin, -12px)); }
    }

    /* ── HERO TEXTE ── */
    .hero-content {
      position: absolute;
      top: clamp(20px, 5vmin, 48px);
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      width: 100%;
      padding: 0 24px;
      z-index: 1;
    }

    .hero-slogan {
      font-size: clamp(0.75em, 2vw, 0.95em);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #a855f7;
      margin-bottom: 10px;
    }

    .hero-h1 {
      font-size: clamp(1.4em, 4vw, 2.2em);
      font-weight: 800;
      color: white;
      margin-bottom: 12px;
      line-height: 1.2;
    }

    .hero-desc {
      font-size: clamp(0.8em, 1.8vw, 0.95em);
      color: #6b6b8a;
      max-width: 480px;
      margin: 0 auto;
      line-height: 1.7;
    }
  </style>
</head>

    </div>

    <div class="orbit-container">
